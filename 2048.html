<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
        }

        .game-header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #333;
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .score-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .score-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            min-width: 120px;
        }

        .score-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
        }

        .game-board {
            background: #bbada0;
            border-radius: 10px;
            padding: 10px;
            position: relative;
            margin: 0 auto 20px;
            width: 400px;
            height: 400px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
        }

        .tile {
            background: #cdc1b4;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            font-weight: bold;
            transition: all 0.15s ease-in-out;
            position: relative;
        }

        .tile.new {
            animation: appear 0.2s ease-in-out;
        }

        .tile.merged {
            animation: merge 0.2s ease-in-out;
        }

        @keyframes appear {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes merge {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 30px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 30px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 30px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 25px; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 25px; }

        .controls {
            text-align: center;
        }

        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .game-over-overlay, .game-won-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .overlay-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }

        .overlay-content h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 36px;
        }

        .overlay-content p {
            color: #666;
            margin-bottom: 30px;
            font-size: 18px;
        }

        .instructions {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .game-board {
                width: 320px;
                height: 320px;
                gap: 8px;
            }
            
            .tile {
                font-size: 28px;
            }
            
            .tile-128, .tile-256, .tile-512 {
                font-size: 24px;
            }
            
            .tile-1024, .tile-2048 {
                font-size: 20px;
            }
            
            h1 {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>2048</h1>
        </div>
        
        <div class="score-container">
            <div class="score-box">
                <div class="score-label">Score</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Best</div>
                <div class="score-value" id="best">0</div>
            </div>
        </div>
        
        <div class="game-board" id="gameBoard"></div>
        
        <div class="controls">
            <button class="btn" onclick="game.restart()">New Game</button>
        </div>
        
        <div class="instructions">
            Use arrow keys or swipe to play. Join tiles to reach 2048!
        </div>
    </div>

    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="overlay-content">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button class="btn" onclick="game.restart()">Try Again</button>
        </div>
    </div>

    <div class="game-won-overlay" id="gameWonOverlay">
        <div class="overlay-content">
            <h2>You Win!</h2>
            <p>Congratulations! You reached 2048!</p>
            <button class="btn" onclick="game.continueGame()">Continue</button>
            <button class="btn" onclick="game.restart()">New Game</button>
        </div>
    </div>

    <script>
        class Game2048 {
            constructor() {
                this.board = [];
                this.score = 0;
                this.best = localStorage.getItem('best2048') || 0;
                this.size = 4;
                this.won = false;
                this.over = false;
                this.touchStartX = 0;
                this.touchStartY = 0;
                this.init();
            }

            init() {
                this.setupBoard();
                this.addRandomTile();
                this.addRandomTile();
                this.updateDisplay();
                this.setupEventListeners();
                document.getElementById('best').textContent = this.best;
            }

            setupBoard() {
                this.board = Array(this.size).fill().map(() => Array(this.size).fill(0));
            }

            setupEventListeners() {
                // Keyboard controls
                document.addEventListener('keydown', (e) => {
                    if (this.over && !this.won) return;
                    
                    let moved = false;
                    switch(e.key) {
                        case 'ArrowUp':
                            e.preventDefault();
                            moved = this.move('up');
                            break;
                        case 'ArrowDown':
                            e.preventDefault();
                            moved = this.move('down');
                            break;
                        case 'ArrowLeft':
                            e.preventDefault();
                            moved = this.move('left');
                            break;
                        case 'ArrowRight':
                            e.preventDefault();
                            moved = this.move('right');
                            break;
                    }
                    
                    if (moved) {
                        this.addRandomTile();
                        this.updateDisplay();
                        this.checkGameStatus();
                    }
                });

                // Touch controls
                const gameBoard = document.getElementById('gameBoard');
                
                gameBoard.addEventListener('touchstart', (e) => {
                    this.touchStartX = e.touches[0].clientX;
                    this.touchStartY = e.touches[0].clientY;
                });

                gameBoard.addEventListener('touchend', (e) => {
                    if (this.over && !this.won) return;
                    
                    const touchEndX = e.changedTouches[0].clientX;
                    const touchEndY = e.changedTouches[0].clientY;
                    
                    const dx = touchEndX - this.touchStartX;
                    const dy = touchEndY - this.touchStartY;
                    
                    const absDx = Math.abs(dx);
                    const absDy = Math.abs(dy);
                    
                    if (Math.max(absDx, absDy) > 30) {
                        let moved = false;
                        if (absDx > absDy) {
                            moved = this.move(dx > 0 ? 'right' : 'left');
                        } else {
                            moved = this.move(dy > 0 ? 'down' : 'up');
                        }
                        
                        if (moved) {
                            this.addRandomTile();
                            this.updateDisplay();
                            this.checkGameStatus();
                        }
                    }
                });
            }

            addRandomTile() {
                const emptyCells = [];
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        if (this.board[i][j] === 0) {
                            emptyCells.push({row: i, col: j});
                        }
                    }
                }
                
                if (emptyCells.length > 0) {
                    const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    this.board[randomCell.row][randomCell.col] = Math.random() < 0.9 ? 2 : 4;
                }
            }

            move(direction) {
                const oldBoard = this.board.map(row => [...row]);
                let moved = false;

                if (direction === 'left') {
                    for (let i = 0; i < this.size; i++) {
                        const row = this.board[i].filter(val => val !== 0);
                        const merged = this.mergeRow(row);
                        this.board[i] = merged.concat(Array(this.size - merged.length).fill(0));
                    }
                } else if (direction === 'right') {
                    for (let i = 0; i < this.size; i++) {
                        const row = this.board[i].filter(val => val !== 0);
                        const merged = this.mergeRow(row.reverse()).reverse();
                        this.board[i] = Array(this.size - merged.length).fill(0).concat(merged);
                    }
                } else if (direction === 'up') {
                    for (let j = 0; j < this.size; j++) {
                        const column = [];
                        for (let i = 0; i < this.size; i++) {
                            if (this.board[i][j] !== 0) {
                                column.push(this.board[i][j]);
                            }
                        }
                        const merged = this.mergeRow(column);
                        for (let i = 0; i < this.size; i++) {
                            this.board[i][j] = merged[i] || 0;
                        }
                    }
                } else if (direction === 'down') {
                    for (let j = 0; j < this.size; j++) {
                        const column = [];
                        for (let i = 0; i < this.size; i++) {
                            if (this.board[i][j] !== 0) {
                                column.push(this.board[i][j]);
                            }
                        }
                        const merged = this.mergeRow(column.reverse()).reverse();
                        for (let i = 0; i < this.size; i++) {
                            this.board[i][j] = merged[this.size - 1 - i] || 0;
                        }
                    }
                }

                // Check if board changed
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        if (oldBoard[i][j] !== this.board[i][j]) {
                            moved = true;
                            break;
                        }
                    }
                }

                return moved;
            }

            mergeRow(row) {
                const merged = [];
                let i = 0;
                
                while (i < row.length) {
                    if (i < row.length - 1 && row[i] === row[i + 1]) {
                        merged.push(row[i] * 2);
                        this.score += row[i] * 2;
                        i += 2;
                    } else {
                        merged.push(row[i]);
                        i++;
                    }
                }
                
                return merged;
            }

            updateDisplay() {
                const gameBoard = document.getElementById('gameBoard');
                gameBoard.innerHTML = '';
                
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        
                        if (this.board[i][j] !== 0) {
                            tile.textContent = this.board[i][j];
                            tile.classList.add(`tile-${this.board[i][j]}`);
                            tile.classList.add('new');
                        }
                        
                        gameBoard.appendChild(tile);
                    }
                }
                
                document.getElementById('score').textContent = this.score;
                
                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('best2048', this.best);
                    document.getElementById('best').textContent = this.best;
                }
            }

            checkGameStatus() {
                // Check for 2048
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        if (this.board[i][j] === 2048 && !this.won) {
                            this.won = true;
                            this.showWinOverlay();
                            return;
                        }
                    }
                }

                // Check for game over
                if (!this.hasAvailableMoves()) {
                    this.over = true;
                    this.showGameOverOverlay();
                }
            }

            hasAvailableMoves() {
                // Check for empty cells
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        if (this.board[i][j] === 0) {
                            return true;
                        }
                    }
                }

                // Check for possible merges
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        const current = this.board[i][j];
                        if ((i < this.size - 1 && this.board[i + 1][j] === current) ||
                            (j < this.size - 1 && this.board[i][j + 1] === current)) {
                            return true;
                        }
                    }
                }

                return false;
            }

            showGameOverOverlay() {
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOverOverlay').style.display = 'flex';
            }

            showWinOverlay() {
                document.getElementById('gameWonOverlay').style.display = 'flex';
            }

            hideOverlays() {
                document.getElementById('gameOverOverlay').style.display = 'none';
                document.getElementById('gameWonOverlay').style.display = 'none';
            }

            restart() {
                this.board = [];
                this.score = 0;
                this.won = false;
                this.over = false;
                this.hideOverlays();
                this.init();
            }

            continueGame() {
                this.hideOverlays();
            }
        }

        // Initialize game
        const game = new Game2048();
    </script>
</body>
</html>
